# CI mínimo: roda lint + testes + build em todo PR e push pra main.
# Os 148 testes cobrem os caminhos que gastam dinheiro (HubSpot, cnpj_match,
# ssrf, whatsapp_send) — este gate impede que uma regressão neles chegue em prod.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verificar:
    runs-on: ubuntu-latest
    # Credenciais-placeholder: src/lib/supabase.ts lança no load se faltarem as
    # VITE_SUPABASE_*. Os testes não fazem chamada real (o client só é construído),
    # então valores fictícios bastam pra não derrubar suites que importam o client
    # (ex.: buscaMassa.test → buscaMassa.ts → supabase). NÃO são segredos.
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (não npm ci): o package-lock.json é gerado no Windows (máquina
      # do time) e não lista as deps nativas de Linux (@emnapi/*, binários do
      # Vite/Rollup), então npm ci — que é estrito — falha no runner Ubuntu.
      # npm install resolve as deps por plataforma. Trade-off aceito p/ ferramenta
      # interna; o ganho real do CI é rodar lint+test+build, não o frozen-lock.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run test
      - run: npm run build
