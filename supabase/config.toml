# Supabase config — versiona o verify_jwt POR função (antes era um flag manual de
# deploy, fora do controle de versão).
#
# Posture:
#  - whatsapp-webhook é PÚBLICO p/ a Meta (não há JWT de usuário num webhook); a
#    segurança dele é a verificação HMAC da assinatura no código + o verify_token
#    do handshake. Por isso verify_jwt = false (senão a plataforma 401-aria a Meta
#    e o inbound pararia silenciosamente).
#  - as demais funções exigem JWT na plataforma (a anon key passa, mas o
#    requireAuthenticatedUser no código rejeita anon → só membro logado dispara
#    ação paga/sensível).
project_id = "jcfeydjzjnjdeubrchbg"

[functions.whatsapp-webhook]
verify_jwt = false

# Funções internas/webhook da Olivia: chamadas server-to-server com o segredo
# OLIVIA_TRIGGER_SECRET (header x-olivia-secret), SEM JWT de usuário — ou por
# webhooks externos (HubSpot). Precisam de verify_jwt = false senão a plataforma
# 401-a a chamada antes do código rodar. Versionado aqui pra não regredir num
# deploy (deploy de função fora do config.toml reseta o flag pro default = true).
[functions.olivia-responder]
verify_jwt = false

[functions.olivia-agendar]
verify_jwt = false

[functions.olivia-flush]
verify_jwt = false

[functions.olivia-followup]
verify_jwt = false

[functions.olivia-nudge]
verify_jwt = false

# Cron de no-show: server-to-server (segredo interno), sem JWT.
[functions.olivia-noshow]
verify_jwt = false

[functions.olivia-hubspot-webhook]
verify_jwt = false

# Busca em massa: o scrape-worker chama buscar-grade/geocodar-local server-to-
# server (x-olivia-secret); todas fazem auth no código (segredo e/ou usuário
# logado). verify_jwt=false versionado — senão um deploy fora do config.toml
# vira o default true e a plataforma 401-a o worker antes do código rodar.
[functions.buscar-grade]
verify_jwt = false

[functions.geocodar-local]
verify_jwt = false

[functions.scrape-worker]
verify_jwt = false

[functions.scrape-enqueue]
verify_jwt = false

[functions.scrape-control]
verify_jwt = false

[functions.autocomplete-local]
verify_jwt = false

[functions.buscar-negocios]
verify_jwt = true

[functions.encontrar-whatsapp]
verify_jwt = true

[functions.enriquecer-lead]
verify_jwt = true

[functions.enviar-whatsapp]
verify_jwt = true

[functions.exportar-hubspot]
verify_jwt = true

[functions.hubspot-sync]
verify_jwt = true

[functions.instagram-followers]
verify_jwt = true

[functions.importar-squad-leads]
verify_jwt = true

[functions.manual-olivia-lead]
verify_jwt = true

# Reschedule pelo app: usuário logado (requireAuthenticatedUser no código).
[functions.olivia-remarcar]
verify_jwt = true
